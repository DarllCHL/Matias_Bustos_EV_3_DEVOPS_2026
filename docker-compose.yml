#version: "3.8"

services:
  frontend:
    build: ./tienda-tech-frontend
    container_name: tienda-tech-frontend
    mem_limit: 128m
    cpus: 0.5
    ports:
      - "8080:80"
    depends_on:
      - backend
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '0.5'
    #       memory: 128M
    #     reservations:
    #       cpus: '0.1'
    #       memory: 64M

  backend:
    build: ./tienda-tech-backend
    container_name: tienda-tech-backend
    mem_limit: 256m
    cpus: 1.0
    environment:
      DB_HOST: db
      DB_USER: alumno
      DB_PASSWORD: alumno123
      DB_NAME: tienda_tecnologica
      DB_PORT: 3306
      CORS_ORIGIN: "*" 
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '1.0'
    #       memory: 256M
    #     reservations:
    #       cpus: '0.25'
    #       memory: 128M

  db:
    build: ./tienda-tech-db
    container_name: tienda-tech-db
    mem_limit: 512m
    cpus: 1.0
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "alumno", "-palumno123"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '1.0'
    #       memory: 512M
    #     reservations:
    #       cpus: '0.25'
    #       memory: 256M

volumes:
  dbdata: